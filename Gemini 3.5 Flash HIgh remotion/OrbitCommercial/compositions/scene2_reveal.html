          border-bottom: 1px solid rgba(255, 255, 255, 0.05);

          justify-content: center;

        .media-tag {

        .media-meta {

        .media-title {

          text-overflow: ellipsis;

        .media-status {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-top: 6px;
          font-size: 10px;
          color: rgba(255, 255, 255, 0.65);
        }
        .status-dot {
          width: 6px;
          height: 6px;
          background: #10b981;
          border-radius: 50%;
        }

        /* CUSTOM ANIMATED CURSOR COMPONENT */
        .custom-cursor {
          position: absolute;
          width: 24px;
          height: 24px;
          pointer-events: none;
          z-index: 9999;
          transform: translate(-50%, -50%);
          display: flex;
          align-items: center;
          justify-content: center;
          opacity: 0;
        }
        .cursor-ring {
          position: absolute;
          width: 20px;
          height: 20px;
          border: 2px solid #ffffff;
          border-radius: 50%;
          box-shadow: 0 0 8px rgba(255,255,255,0.4);
          transition: transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .cursor-dot {
          width: 6px;
          height: 6px;
          background: #6366f1;
          border-radius: 50%;
        }
        .cursor-ripple {
          position: absolute;
          width: 40px;
          height: 40px;
          border: 1.5px solid #6366f1;
          border-radius: 50%;
          opacity: 0;
          transform: scale(0.2);
        }
      </style>

      <div id="root" data-composition-id="scene2" data-width="1920" data-height="1080">
        <!-- Spatial Grid -->

        <!-- 3D Camera Rig -->
        <div class="camera-rig" id="scene2-rig">
          <!-- Floating Dashboard -->

            <!-- Sidebar -->

              <div class="logo-wrap">
                <div class="logo-dot">
                  <div class="logo-ring"></div>

              <div class="menu-items">
                <div class="menu-item active">
                  <div class="menu-icon"></div>

            <!-- Content Area -->
            <div class="main-content">

              <!-- Interactive Cards -->
              <div class="cards-row">

        <!-- Custom Cursor -->
        <div class="custom-cursor" id="scene2-cursor">

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Rig and Dashboard Entrance (Subtle Tilt, Camera Push-in)
        tl.fromTo("#scene2-rig",
          { opacity: 0, scale: 0.85, transform: "rotateY(-15deg) rotateX(10deg) translateZ(-100px)" },
          { opacity: 1, scale: 1.0, transform: "rotateY(-5deg) rotateX(3deg) translateZ(0px)", duration: 1.2, ease: "power2.out" },
          0
        );

        // Continuous camera parallax drift (gentle push)
        tl.to("#scene2-rig", {
          transform: "rotateY(-1deg) rotateX(1deg) translateZ(80px)",
          duration: 3.8,
          ease: "none"
        }, 1.2);

        // 2. Cursor entrance (accelerates from off-screen bottom-right)
        tl.fromTo("#scene2-cursor",
          { opacity: 0, left: 1800, top: 900 },
          { opacity: 1, left: 1100, top: 320, duration: 1.3, ease: "power3.out" },
          0.4
        );

        // 3. Hovering interaction
        // Cursor moves to hover over "Review Files" card
        tl.to("#scene2-cursor", {
          left: 560,
          top: 260,
          duration: 1.0,
          overwrite: "auto",
          ease: "power2.inOut"
        }, 1.7);

        tl.to("#card-reviews", {
          backgroundColor: "rgba(255, 255, 255, 0.05)",
          borderColor: "rgba(99, 102, 241, 0.4)",
          transform: "translateZ(35px) scale(1.02)",
          duration: 0.1,
          ease: "power2.out"
        }, 2.4);

        // 4. Click interaction (Click starts at ~2.5s global time inside scene = 5.5s overall)
        // Cursor ring shrinks to compress click
        tl.to("#scene2-ring", {
          scale: 0.6,
          borderColor: "#6366f1",
          duration: 0.15,
          ease: "power2.in"
        }, 2.5);

        // Cursor ring expands, click ripple triggers, sound design clicks in index
        tl.to("#scene2-ring", {
          scale: 1.0,
          borderColor: "#ffffff",
          duration: 0.25,
          ease: "power2.out"
        }, 2.65);

        tl.fromTo("#scene2-ripple",
          { opacity: 1, scale: 0.2 },
          { opacity: 0, scale: 1.8, duration: 0.4, ease: "power2.out" },
          2.55
        );

        // Card responds to click (bounce down then return)
        tl.to("#card-reviews", {
          transform: "translateZ(10px) scale(0.98)",
          duration: 0.1,
          overwrite: "auto",
          ease: "power1.in"
        }, 2.5);
        tl.to("#card-reviews", {
          transform: "translateZ(30px) scale(1.0)",
          duration: 0.2,
          overwrite: "auto",
          ease: "power2.out"
        }, 2.6);

        // 5. UI response: smooth grid reveal
        tl.to("#scene2-grid-revealed", {
          opacity: 1,
          transform: "translateY(0px) translateZ(20px)",
          duration: 0.7,
          ease: "power3.out"
        }, 2.65);

        // Staggered slide in of cards inside the grid
        tl.fromTo(".media-item",
          { opacity: 0, transform: "translateY(15px) translateZ(0px)" },
          { opacity: 1, transform: "translateY(0px) translateZ(10px)", duration: 0.5, stagger: 0.1, ease: "power2.out" },
          2.7
        );

        // 6. Cursor moves away and exits
        tl.to("#scene2-cursor", {
          left: 680,
          top: 480,
          duration: 1.0,
          ease: "power2.inOut"
        }, 3.5);

        tl.to("#scene2-cursor", {
          left: -100,
          top: 500,
          opacity: 0,
          duration: 0.8,
          ease: "power3.in"
        }, 4.5);

        // Scene exit fade out
        tl.to("#root", {
          opacity: 0,
          duration: 0.35,
          ease: "power2.inOut"
        }, 4.75);

        window.__timelines["scene2"] = tl;
      </script>
