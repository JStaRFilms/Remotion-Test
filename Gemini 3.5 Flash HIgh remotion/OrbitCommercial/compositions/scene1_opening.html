<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          background: #060608;
          overflow: hidden;
          display: flex;
          align-items: center;
          justify-content: center;
          perspective: 1200px;
        }

        /* Ambient spatial background grid */
        .spatial-grid {
          position: absolute;
          width: 200%;
          height: 200%;
          background-image: 
            linear-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
          background-size: 80px 80px;
          background-position: center;
          transform: translateZ(-300px) rotateX(60deg);
          transform-origin: center center;
          opacity: 0;
        }

        /* Abstract glowing core */
        .glowing-core {
          position: absolute;
          width: 60px;
          height: 60px;
          background: radial-gradient(circle, #ffffff 10%, #6366f1 60%, #4f46e5 100%);
          border-radius: 50%;
          box-shadow: 
            0 0 40px #6366f1,
            0 0 100px rgba(99, 102, 241, 0.8),
            0 0 200px rgba(99, 102, 241, 0.4);
          transform: translateZ(200px);
          opacity: 0;
        }

        /* Orbit Application Window Outline */
        .app-window-outline {
          position: absolute;
          width: 1200px;
          height: 680px;
          border: 1px solid rgba(99, 102, 241, 0.3);
          border-radius: 16px;
          background: rgba(10, 10, 14, 0.6);
          backdrop-filter: blur(12px);
          box-shadow: 
            0 20px 50px rgba(0, 0, 0, 0.8),
            0 0 60px rgba(99, 102, 241, 0.1) inset,
            0 0 1px rgba(255, 255, 255, 0.1) inset;
          transform-style: preserve-3d;
          transform: translateZ(50px) rotateY(-10deg) rotateX(5deg);
          opacity: 0;
          display: flex;
          flex-direction: column;
          padding: 24px;
        }

        /* App Window Header details */
        .window-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
          padding-bottom: 16px;
          margin-bottom: 20px;
        }
        .window-dots {
          display: flex;
          gap: 8px;
        }
        .window-dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.15);
        }
        .window-title {
          font-family: "JetBrains Mono", monospace;
          font-size: 13px;
          color: rgba(255, 255, 255, 0.6);
          letter-spacing: 1px;
        }

        /* Text block participating in the spatial structure */
        .text-wrap {
          flex: 1;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding-left: 40px;
        }
        .text-line {
          font-family: "Outfit", sans-serif;
          font-weight: 800;
          font-size: 72px;
          line-height: 1.1;
          letter-spacing: -2px;
          overflow: hidden;
          height: 85px;
          position: relative;
        }
        .text-inner {
          display: inline-block;
          transform: translateY(100%);
          background: linear-gradient(135deg, #ffffff 40%, rgba(255, 255, 255, 0.6) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .text-inner.accent {
          background: linear-gradient(135deg, #6366f1 40%, #3b82f6 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
      </style>

      <div id="root" data-composition-id="scene1" data-width="1920" data-height="1080">
        <!-- Background space grid -->
        <div class="spatial-grid" id="scene1-grid" data-layout-allow-overflow="true"></div>

        <!-- Flying core -->
        <div class="glowing-core" id="scene1-core"></div>

        <!-- Target App Window Outline -->
        <div class="app-window-outline" id="scene1-window" data-layout-allow-overflow="true">
          <div class="window-header">
            <div class="window-dots">
              <div class="window-dot"></div>
              <div class="window-dot"></div>
              <div class="window-dot"></div>
            </div>
            <div class="window-title">ORBIT // CORE_SESSION</div>
            <div style="width: 46px;"></div>
          </div>
          
          <div class="text-wrap">
            <div class="text-line" data-layout-allow-overflow="true">
              <span class="text-inner" id="scene1-txt1" data-layout-allow-overflow="true">Your work.</span>
            </div>
            <div class="text-line" data-layout-allow-overflow="true">
              <span class="text-inner accent" id="scene1-txt2" data-layout-allow-overflow="true">In motion.</span>
            </div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Grid Entrance and subtle crawl
        tl.fromTo("#scene1-grid", 
          { opacity: 0, transform: "translateZ(-400px) rotateX(60deg) rotateY(0deg) translateY(0px)" },
          { opacity: 1, transform: "translateZ(-200px) rotateX(60deg) rotateY(-5deg) translateY(60px)", duration: 3.0, ease: "power2.out" },
          0
        );

        // 2. Core zoom (accelerates to camera)
        tl.fromTo("#scene1-core",
          { opacity: 0, scale: 0.1, transform: "translateZ(-800px)" },
          { opacity: 1, scale: 1.0, transform: "translateZ(300px)", duration: 1.0, ease: "power2.in" },
          0.2
        );
        tl.to("#scene1-core", {
          opacity: 0,
          scale: 4.5,
          transform: "translateZ(800px)",
          duration: 0.5,
          ease: "none"
        }, 1.2);

        // 3. App Window outline scales down from camera (implied morph from core zoom)
        tl.fromTo("#scene1-window",
          { 
            opacity: 0, 
            scale: 2.2, 
            transform: "translateZ(400px) rotateY(-20deg) rotateX(15deg)" 
          },
          { 
            opacity: 1, 
            scale: 1.0, 
            transform: "translateZ(0px) rotateY(-8deg) rotateX(4deg)", 
            duration: 1.3, 
            ease: "power3.out" 
          },
          1.1
        );

        // Subtle floating rotation for the window
        tl.to("#scene1-window", {
          transform: "translateZ(10px) rotateY(-5deg) rotateX(2deg)",
          duration: 1.0,
          overwrite: "auto",
          ease: "power1.inOut"
        }, 2.0);

        // 4. Text reveal (sliding from clipping boundary, timed relative to window settlement)
        tl.fromTo("#scene1-txt1",
          { translateY: "100%" },
          { translateY: "0%", duration: 0.8, ease: "power3.out" },
          1.5
        );
        tl.fromTo("#scene1-txt2",
          { translateY: "100%" },
          { translateY: "0%", duration: 0.8, ease: "power3.out" },
          1.65
        );

        // 5. Scene exit fade out (towards scene 2 crossfade)
        tl.to("#root", {
          opacity: 0,
          duration: 0.3,
          ease: "power2.inOut"
        }, 2.7);

        window.__timelines["scene1"] = tl;
      </script>
    </template>
  </body>
</html>
