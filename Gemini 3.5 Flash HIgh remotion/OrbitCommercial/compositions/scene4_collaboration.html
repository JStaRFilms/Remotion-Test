<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          background: #060608;
          overflow: hidden;
          display: flex;
          align-items: center;
          justify-content: center;
          perspective: 1600px;
        }

        .workspace-canvas {
          position: relative;
          width: 1200px;
          height: 680px;
          background: rgba(13, 13, 18, 0.5);
          border: 1px solid rgba(255, 255, 255, 0.06);
          border-radius: 20px;
          backdrop-filter: blur(15px);
          box-shadow: 0 40px 80px rgba(0,0,0,0.7);
          transform-style: preserve-3d;
          display: flex;
          flex-direction: column;
          padding: 32px;
        }

        /* Ambient grid */
        .scene4-grid {
          position: absolute;
          width: 150%;
          height: 150%;
          background-image: 
            linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
          background-size: 50px 50px;
          transform: translateZ(-200px);
          opacity: 0.8;
        }

        /* Top navigation of collaboration workspace */
        .collab-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          border-bottom: 1px solid rgba(255, 255, 255, 0.06);
          padding-bottom: 20px;
          margin-bottom: 30px;
        }
        .collab-title {
          font-family: "Outfit", sans-serif;
          font-size: 24px;
          font-weight: 600;
        }
        .avatar-group {
          display: flex;
          gap: -8px; /* overlap */
          align-items: center;
        }
        .avatar {
          width: 36px;
          height: 36px;
          border-radius: 50%;
          border: 2px solid #0d0d12;
          background: #3b82f6;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 11px;
          font-weight: bold;
          position: relative;
        }
        .avatar.purple { background: #8b5cf6; }
        .avatar.pink { background: #ec4899; }
        
        /* Collaborative workspace lanes */
        .lanes {
          display: flex;
          gap: 24px;
          flex: 1;
          transform-style: preserve-3d;
        }
        .lane {
          flex: 1;
          background: rgba(255, 255, 255, 0.01);
          border: 1px dashed rgba(255, 255, 255, 0.04);
          border-radius: 12px;
          padding: 16px;
          display: flex;
          flex-direction: column;
          gap: 16px;
          transform-style: preserve-3d;
        }
        .lane-title {
          font-family: "JetBrains Mono", monospace;
          font-size: 12px;
          color: rgba(255, 255, 255, 0.65);
          letter-spacing: 1px;
        }

        /* Interactive Drop target */
        .drop-target {
          height: 120px;
          border: 1.5px dashed rgba(99, 102, 241, 0.3);
          border-radius: 10px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: "JetBrains Mono", monospace;
          font-size: 12px;
          color: #a5b4fc;
          position: relative;
          overflow: hidden;
          background: rgba(99, 102, 241, 0.01);
        }

        /* The Morphed UI card (starts invisible, fades in on drop) */
        .morphed-card {
          position: absolute;
          inset: 0;
          background: linear-gradient(135deg, #121026, #1c0d29);
          border: 1px solid rgba(99, 102, 241, 0.4);
          border-radius: 8px;
          padding: 16px;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          opacity: 0;
          transform: scale(0.9);
          box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }
        .card-tag {
          font-family: "JetBrains Mono", monospace;
          font-size: 9px;
          background: #1e1b4b;
          border: 1px solid rgba(165, 180, 252, 0.4);
          color: #ffffff;
          font-weight: 700;
          padding: 2px 6px;
          border-radius: 4px;
          width: fit-content;
        }

        /* Dynamic captions moving in space */
        .spatial-caption {
          position: absolute;
          font-family: "Outfit", sans-serif;
          font-weight: 700;
          font-size: 38px;
          color: #ffffff;
          padding: 10px 20px;
          border-radius: 8px;
          pointer-events: none;
          transform-style: preserve-3d;
          white-space: nowrap;
          text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .spatial-caption.draggable {
          background: rgba(255, 255, 255, 0.08);
          border: 1px solid rgba(255, 255, 255, 0.15);
          backdrop-filter: blur(10px);
          box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        /* Team cursor bubble indicator */
        .user-tag {
          position: absolute;
          bottom: -22px;
          right: -40px;
          font-family: "JetBrains Mono", monospace;
          font-size: 10px;
          background: #6366f1;
          color: #ffffff;
          padding: 2px 8px;
          border-radius: 4px;
          white-space: nowrap;
        }

        /* Cursor styles */
        .custom-cursor {
          position: absolute;
          width: 24px;
          height: 24px;
          pointer-events: none;
          z-index: 9999;
          transform: translate(-50%, -50%);
          display: flex;
          align-items: center;
          justify-content: center;
          opacity: 0;
        }
        .cursor-ring {
          position: absolute;
          width: 20px;
          height: 20px;
          border: 2px solid #ffffff;
          border-radius: 50%;
          box-shadow: 0 0 8px rgba(255,255,255,0.4);
        }
        .cursor-dot {
          width: 6px;
          height: 6px;
          background: #6366f1;
          border-radius: 50%;
        }
        .cursor-ripple {
          position: absolute;
          width: 40px;
          height: 40px;
          border: 1.5px solid #6366f1;
          border-radius: 50%;
          opacity: 0;
          transform: scale(0.2);
        }
      </style>

      <div id="root" data-composition-id="scene4" data-width="1920" data-height="1080">
        <div class="scene4-grid" data-layout-allow-overflow="true"></div>

        <div class="workspace-canvas" id="scene4-canvas">
          <div class="collab-header">
            <div class="collab-title">Collaboration Space</div>
            <div class="avatar-group">
              <div class="avatar" style="z-index:3">AM</div>
              <div class="avatar purple" style="z-index:2">JD</div>
              <div class="avatar pink" style="z-index:1" id="scene4-avatar3">SL</div>
            </div>
          </div>

          <div class="lanes">
            <!-- Lane 1: Pipeline -->
            <div class="lane">
              <div class="lane-title">01 / CONCEPT</div>
              <div class="drop-target" id="scene4-target">
                <span id="scene4-drag-prompt">[ DRAG IDEA HERE ]</span>
                
                <!-- Morphed UI card that appears after drop -->
                <div class="morphed-card" id="scene4-morphed">
                  <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="card-tag" style="color: #ffffff !important;">CAMPAIGN</div>
                    <div style="font-size:10px; font-weight:700; color:#ffffff;">NEW</div>
                  </div>
                  <div style="font-family:'Outfit',sans-serif; font-size:16px; font-weight:600; margin-top:8px; line-height:1.2;">Summer Campaign v1</div>
                  <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:rgba(255,255,255,0.85); margin-top:4px;">ID: ORB-9801</div>
                </div>
              </div>
            </div>

            <!-- Lane 2: Active reviews -->
            <div class="lane" style="border-style: solid; background: rgba(255,255,255,0.02)">
              <div class="lane-title">02 / ACTIVE REVIEW</div>
              <div style="height: 60px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:8px; display:flex; align-items:center; padding:12px; gap:12px;">
                <div style="width:8px; height:8px; border-radius:50%; background:#10b981"></div>
                <div style="flex:1; height:6px; background:rgba(255,255,255,0.1); border-radius:3px;"></div>
                <div style="width:30px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px;"></div>
              </div>
            </div>

            <!-- Lane 3: Deliver -->
            <div class="lane">
              <div class="lane-title">03 / COMPLETED</div>
              <div style="height: 65px; border:1px solid rgba(255,255,255,0.05); border-radius:8px; display:flex; align-items:center; justify-content:center; gap:8px;" id="scene4-ship-zone">
                <div style="width:20px; height:20px; border-radius:50%; border:2px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center;">✓</div>
                <span style="font-size:11px; opacity:0.3; font-family:'JetBrains Mono',monospace;">Archive empty</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Timed Spatial Captions -->
        <!-- Caption 1: Drags into interface -->
        <div class="spatial-caption draggable" id="caption-drop" style="top: 150px; left: 100px;">
          Drop the idea.
          <div class="user-tag" id="user-tag-cursor">Alex M.</div>
        </div>

        <!-- Caption 2: Teammate bubble -->
        <div class="spatial-caption" id="caption-shape" style="top: 300px; right: 150px; color:#c7d2fe; font-size: 32px; opacity: 0;" data-layout-allow-occlusion="true">
          “Shape it together.”
        </div>

        <!-- Caption 3: Bold Z-space scale reveal -->
        <div class="spatial-caption" id="caption-ship" style="bottom: 80px; left: 50%; font-size: 54px; font-weight:800; opacity: 0; text-align:center; transform: translateX(-50%); letter-spacing:-1px;" data-layout-allow-occlusion="true">
          Ship it while it matters.
        </div>

        <!-- Custom Cursor -->
        <div class="custom-cursor" id="scene4-cursor">
          <div class="cursor-ripple" id="scene4-ripple"></div>
          <div class="cursor-ring" id="scene4-ring"></div>
          <div class="cursor-dot"></div>
        </div>

      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 1. Workspace entry (perspective camera slide)
        tl.fromTo("#scene4-canvas",
          { opacity: 0, transform: "rotateY(-10deg) rotateX(8deg) translateZ(-150px)" },
          { opacity: 1, transform: "rotateY(-2deg) rotateX(1deg) translateZ(0px)", duration: 1.0, ease: "power2.out" },
          0
        );

        // Continuous drift
        tl.to("#scene4-canvas", {
          transform: "rotateY(2deg) rotateX(-1deg) translateZ(60px)",
          duration: 4.8,
          ease: "none"
        }, 1.0);

        // 2. Caption 1 "Drop the idea" enters from top-left (before cursor grabs it)
        tl.fromTo("#caption-drop",
          { opacity: 0, scale: 0.8, x: -50, y: -30 },
          { opacity: 1, scale: 1.0, x: 0, y: 0, duration: 0.7, ease: "back.out(1.5)" },
          0.3
        );

        // 3. Cursor enters, hovers over Caption 1
        tl.fromTo("#scene4-cursor",
          { opacity: 0, left: 900, top: 800 },
          { opacity: 1, left: 240, top: 190, duration: 0.8, ease: "power2.out" },
          0.4
        );

        // Hover effect on the draggable caption
        tl.to("#caption-drop", {
          borderColor: "#6366f1",
          boxShadow: "0 25px 45px rgba(99, 102, 241, 0.25)",
          scale: 1.03,
          duration: 0.3,
          ease: "power2.out"
        }, 1.0);

        // Click compression (grab text)
        tl.to("#scene4-ring", { scale: 0.6, duration: 0.15 }, 1.15);
        tl.fromTo("#scene4-ripple",
          { opacity: 1, scale: 0.2 },
          { opacity: 0, scale: 1.5, duration: 0.35 },
          1.2
        );

        // 4. Drag operation: Move cursor and Caption 1 together to the placeholder lane target
        // Target is at approximately: Left 460, Top 420
        tl.to(["#scene4-cursor", "#caption-drop"], {
          left: 460,
          top: 420,
          duration: 1.2,
          ease: "power3.inOut"
        }, 1.3);

        // Highlight drop target when dragged over
        tl.to("#scene4-target", {
          borderColor: "rgba(99, 102, 241, 0.8)",
          backgroundColor: "rgba(99, 102, 241, 0.05)",
          duration: 0.4
        }, 1.9);

        // 5. Release / Drop (starts at ~2.5s scene time = 15.5s global)
        tl.to("#scene4-ring", { scale: 1.0, duration: 0.2 }, 2.5);
        
        // Caption 1 morphs/dissolves into the card outline (becomes a real UI item)
        tl.to("#caption-drop", {
          opacity: 0,
          scale: 0.7,
          duration: 0.35,
          ease: "power2.in"
        }, 2.5);

        tl.to("#scene4-drag-prompt", {
          opacity: 0,
          duration: 0.3,
          ease: "power2.in"
        }, 2.5);

        tl.to("#scene4-morphed", {
          opacity: 1,
          scale: 1.0,
          duration: 0.5,
          ease: "back.out(1.8)"
        }, 2.6);

        tl.to("#scene4-target", {
          borderColor: "rgba(99, 102, 241, 0.2)",
          backgroundColor: "rgba(99, 102, 241, 0.01)",
          duration: 0.4
        }, 2.6);

        // 6. Caption 2 "Shape it together" emerges from teammate avatar
        // Teammate avatar JD/SL pulses
        tl.to("#scene4-avatar3", {
          scale: 1.2,
          borderColor: "#ec4899",
          duration: 0.3,
          yoyo: true,
          repeat: 1
        }, 3.0);

        tl.fromTo("#caption-shape",
          { opacity: 0, x: 40, scale: 0.9 },
          { opacity: 1, x: 0, scale: 1.0, duration: 0.8, ease: "power2.out" },
          3.2
        );

        // 7. Caption 3 "Ship it while it matters" scales up from Z-space
        tl.fromTo("#caption-ship",
          { opacity: 0, scale: 0.5, translateZ: "-300px" },
          { opacity: 1, scale: 1.0, translateZ: "50px", duration: 1.1, ease: "back.out(1.2)" },
          4.0
        );

        // Glow effect on completion lane to coordinate with Caption 3
        tl.to("#scene4-ship-zone", {
          borderColor: "rgba(16, 185, 129, 0.5)",
          boxShadow: "0 0 20px rgba(16, 185, 129, 0.15)",
          duration: 0.8
        }, 4.6);

        // Cursor moves away
        tl.to("#scene4-cursor", {
          left: 1000,
          top: 300,
          duration: 1.0,
          ease: "power2.inOut"
        }, 4.2);

        // Scene exit fade out
        tl.to("#root", {
          opacity: 0,
          duration: 0.4,
          ease: "power2.inOut"
        }, 5.6);

        window.__timelines["scene4"] = tl;
      </script>
    </template>
  </body>
</html>
